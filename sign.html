<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transit Express - Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="sign.js" defer></script>
  </head>
  <body class="bg-gray-100">

<!-- nav bar -->
<header class="fixed top-0 left-0 w-full bg-gray-100 shadow-md z-50">
  <div class="container mx-auto flex flex-wrap p-5 items-center justify-between">
    <!-- Brand -->
    <a class="flex title-font font-bold items-center text-orange-500 text-2xl">
      Transit Express
    </a>

    <!-- Mobile Menu -->
    <div class="md:hidden">
      <input type="checkbox" id="menu-toggle" class="hidden peer" />
      <label for="menu-toggle" class="cursor-pointer text-orange-500">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </label>
      <nav id="mobileMenu" class="hidden peer-checked:flex flex-col space-y-4 mt-4 bg-gray-100 p-4 rounded shadow-md">
        <a href="index.html" class="text-orange-500 hover:text-blue-600 font-medium">Home</a>
        <a href="routes.html" class="text-orange-500 hover:text-blue-600 font-medium">Routes</a>
        <a href="courier.html" class="text-orange-500 hover:text-blue-600 font-medium">Courier Services</a>
        <a href="booking.html" class="text-orange-500 hover:text-blue-600 font-medium">Booking</a>
        <a href="viewtickets.html" class="text-orange-500 hover:text-blue-600 font-medium">View Tickets</a>
        <!-- Dynamic link -->
        <a id="navActionMobile" href="login.html" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 font-medium">
          Login / Sign Up
        </a>
      </nav>
    </div>

    <!-- Desktop Menu -->
    <nav id="desktopMenu" class="hidden md:flex md:flex-row md:items-center md:space-x-6">
      <a href="index.html" class="text-orange-500 hover:text-blue-600 font-medium">Home</a>
      <a href="routes.html" class="text-orange-500 hover:text-blue-600 font-medium">Routes</a>
      <a href="courier.html" class="text-orange-500 hover:text-blue-600 font-medium">Courier Services</a>
      <a href="booking.html" class="text-orange-500 hover:text-blue-600 font-medium">Booking</a>
      <a href="viewtickets.html" class="text-orange-500 hover:text-blue-600 font-medium">View Tickets</a>
      <!-- Dynamic link -->
      <a id="navActionDesktop" href="login.html" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 font-medium">
        Login / Sign Up
      </a>
    </nav>
  </div>
</header>



    <!-- Sign Up Form -->
    <main class="flex items-center justify-center h-screen">
      <div class="bg-white p-8 rounded-lg shadow-lg w-96 mt-20">
        <h2 class="text-2xl font-bold text-orange-500 mb-6 text-center">
          Create Account
        </h2>
        <form id="signupForm" class="space-y-4">
          <div>
            <label for="signupEmail" class="block text-gray-700 font-medium"
              >Email</label
            >
            <input
              type="email"
              id="signupEmail"
              class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
              placeholder="Enter Gmail address"
              required
            />
          </div>
          <div>
            <label for="signupPassword" class="block text-gray-700 font-medium"
              >Password</label
            >
            <input
              type="password"
              id="signupPassword"
              class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
              placeholder="Enter password"
              required
            />
          </div>
          <button
            type="submit"
            class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 font-medium"
          >
            Sign Up
          </button>
        </form>
      </div>
    </main>

    <!-- Popup Modal -->
    <div
      id="popup"
      class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
    >
      <div class="bg-white rounded-lg shadow-lg p-6 w-80 text-center">
        <p id="popupMessage" class="text-gray-700 mb-4"></p>
        <button
          id="popupClose"
          class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600"
        >
          OK
        </button>
      </div>
    </div>


<!-- Inline nav bar script -->
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const navActionDesktop = document.getElementById("navActionDesktop");
    const navActionMobile = document.getElementById("navActionMobile");

    const currentUser = localStorage.getItem("currentUser");
    const accounts = JSON.parse(localStorage.getItem("accounts")) || {};

    if (currentUser && accounts[currentUser]) {
      // Logged in → show Account
      navActionDesktop.textContent = "Account";
      navActionDesktop.href = "account.html";
      navActionMobile.textContent = "Account";
      navActionMobile.href = "account.html";
    } else {
      // Not logged in → show Login / Sign Up
      navActionDesktop.textContent = "Login / Sign Up";
      navActionDesktop.href = "login.html";
      navActionMobile.textContent = "Login / Sign Up";
      navActionMobile.href = "login.html";
    }
  });
</script>

  </body>
</html>
