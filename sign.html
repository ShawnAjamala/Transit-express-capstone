<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
     <script src="sign.js" defer></script>
</head>
<body>
      <!-- nav bar -->
   <header class="fixed top-0 left-0 w-full bg-gray-100 shadow-md z-50">
  <div class="container mx-auto flex flex-wrap p-5 items-center justify-between">
    
    <!-- Brand -->
    <a class="flex title-font font-bold items-center text-orange-500 text-2xl">
      Transit Express
    </a>

    <!-- Hamburger Toggle (Mobile Only) -->
    <input type="checkbox" id="menu-toggle" class="hidden peer" />
    <label for="menu-toggle" class="md:hidden cursor-pointer text-orange-500">
      <!-- Hamburger Icon -->
      <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" 
           viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
              d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </label>

    <!-- Navigation -->
    <nav class="hidden peer-checked:flex md:flex flex-col md:flex-row md:items-center md:space-x-6 bg-gray-100 md:bg-transparent w-full md:w-auto mt-4 md:mt-0 p-4 md:p-0">
      <a href="index.html" class="text-orange-500 hover:text-blue-600 font-medium">Home</a>
      <a href="routes.html" class="text-orange-500 hover:text-blue-600 font-medium">Routes</a>
      <a href="courier.html" class="text-orange-500 hover:text-blue-600 font-medium">Courier Services</a>
      <a href="booking.html" class="text-orange-500 hover:text-blue-600 font-medium">Booking</a>
      <a href="login.html" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 font-medium mt-2 md:mt-0">Login</a>
    </nav>
  </div>
</header>


<form id="signupForm" class="bg-gray-100 shadow-lg rounded-lg w-full max-w-md p-6 sm:p-8 mx-auto mt-24">
  <div class="text-center font-bold text-3xl text-orange-500 mb-2">
    Transit Express
  </div>

  <div class="h-px bg-gray-200 mb-4"></div>

  <div class="flex flex-col gap-4">
    <!-- Full Name -->
    <div>
      <label for="signupName" class="text-gray-700">Full Name</label>
      <input
        id="signupName"
        type="text"
        placeholder="Full Name"
        required
        class="w-full border border-gray-300 rounded px-3 py-2 mt-1 focus:outline-none focus:ring-2 focus:ring-orange-500"
      />
    </div>

    <!-- Email -->
    <div>
      <label for="signupEmail" class="text-gray-700">Email address</label>
      <input
        id="signupEmail"
        type="email"
        placeholder="Email address"
        required
        class="w-full border border-gray-300 rounded px-3 py-2 mt-1 focus:outline-none focus:ring-2 focus:ring-orange-500"
      />
    </div>

    <!-- Password -->
    <div>
      <label for="signupPassword" class="text-gray-700">Password</label>
      <input
        id="signupPassword"
        type="password"
        placeholder="Create a password"
        required
        class="w-full border border-gray-300 rounded px-3 py-2 mt-1 focus:outline-none focus:ring-2 focus:ring-orange-500"
      />
    </div>

    <!-- Buttons -->
    <div class="flex gap-2">
      <button
        type="submit"
        class="w-1/2 bg-blue-500 text-white py-2 rounded hover:bg-blue-600 transition"
      >
        Sign Up
      </button>
      <a
        href="login.html"
        class="w-1/2 bg-gray-200 text-blue-600 py-2 rounded text-center hover:underline transition"
      >
        Back to Login
      </a>
    </div>
  </div>

  <div class="text-center text-sm text-gray-500 mt-6">© Transit Express 2026</div>
</form>




</body>
</html>
