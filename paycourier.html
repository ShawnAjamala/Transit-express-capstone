
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Courier Payment</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    function loadBooking() {
      const bookingData = JSON.parse(localStorage.getItem("courierBooking"));
      if (bookingData) {
        document.getElementById("bookingSummary").innerText =
          `Client: ${bookingData.name}
Parcel: ${bookingData.parcelDescription}
Weight: ${bookingData.weight}kg
Parcels: ${bookingData.parcelCount}
Pickup: ${bookingData.pickupStation}
Drop-off: ${bookingData.dropoffStation}
Date: ${bookingData.pickupDate}
Time: ${bookingData.pickupTime}`;
      } else {
        document.getElementById("bookingSummary").innerText =
          "No booking data found. Please go back and fill the courier form.";
      }
    }

    function processPayment() {
      alert("Payment successful! Your courier booking is confirmed.");
      document.getElementById("paymentEvidence").innerText =
        "Payment Reference: TXN-" + Math.floor(Math.random() * 1000000);
    }
  </script>
</head>
<body onload="loadBooking()" class="bg-gray-100 p-8">

  <header class="fixed top-0 left-0 w-full bg-gray-100 shadow-md z-50">
      <div
        class="container mx-auto flex flex-wrap p-5 items-center justify-between"
      >
        <!-- Brand -->
        <a
          class="flex title-font font-bold items-center text-orange-500 text-2xl"
        >
          Transit Express
        </a>

        <!-- Hamburger Toggle (Mobile Only) -->
        <input type="checkbox" id="menu-toggle" class="hidden peer" />
        <label
          for="menu-toggle"
          class="md:hidden cursor-pointer text-orange-500"
        >
          <!-- Hamburger Icon -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-8 w-8"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
        </label>

        <!-- Navigation -->
        <nav
          class="hidden peer-checked:flex md:flex flex-col md:flex-row md:items-center md:space-x-6 bg-gray-100 md:bg-transparent w-full md:w-auto mt-4 md:mt-0 p-4 md:p-0"
        >
          <a
            href="index.html"
            class="text-orange-500 hover:text-blue-600 font-medium"
            >Home</a
          >
          <a
            href="routes.html"
            class="text-orange-500 hover:text-blue-600 font-medium"
            >Routes</a
          >
          <a
            href="courier.html"
            class="text-orange-500 hover:text-blue-600 font-medium"
            >Courier Services</a
          >
          <a
            href="booking.html"
            class="text-orange-500 hover:text-blue-600 font-medium"
            >Booking</a
          >
          <a
            href="login.html"
            class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 font-medium mt-2 md:mt-0"
            >Login</a
          >
        </nav>
      </div>
    </header>
  <div class="max-w-xl mx-auto bg-white p-6 rounded-lg shadow-md mt-16">
    <h2 class="text-2xl font-bold text-orange-500 mb-4 text-center">Payment Page</h2>

    <p id="bookingSummary" class="mb-4 text-gray-700 whitespace-pre-line"></p>

    <button onclick="processPayment()" 
      class="bg-blue-600 text-white px-6 py-3 rounded-md font-semibold hover:bg-blue-700 transition w-full mb-4">
      Pay Now
    </button>

    <p id="paymentEvidence" class="text-indigo-600 font-semibold text-center"></p>

    <a href="courier.html" class="block mt-6 text-blue-600 hover:underline text-center">
      ← Back to Courier Form
    </a>
  </div>

</body>
</html>
