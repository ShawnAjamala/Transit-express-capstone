<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="booking.js" defer></script>
</head>
<body class="bg-gray-100 text-black">

<!-- nav bar -->
<header class="fixed top-0 left-0 w-full bg-gray-100 shadow-md z-50">
  <div class="container mx-auto flex flex-wrap p-5 items-center justify-between">
    <!-- Brand -->
    <a class="flex title-font font-bold items-center text-orange-500 text-2xl">
      Transit Express
    </a>

    <!-- Mobile Menu -->
    <div class="md:hidden">
      <input type="checkbox" id="menu-toggle" class="hidden peer" />
      <label for="menu-toggle" class="cursor-pointer text-orange-500">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </label>
      <nav id="mobileMenu" class="hidden peer-checked:flex flex-col space-y-4 mt-4 bg-gray-100 p-4 rounded shadow-md">
        <a href="index.html" class="text-orange-500 hover:text-blue-600 font-medium">Home</a>
        <a href="routes.html" class="text-orange-500 hover:text-blue-600 font-medium">Routes</a>
        <a href="courier.html" class="text-orange-500 hover:text-blue-600 font-medium">Courier Services</a>
        <a href="booking.html" class="text-orange-500 hover:text-blue-600 font-medium">Booking</a>
        <a href="viewtickets.html" class="text-orange-500 hover:text-blue-600 font-medium">View Tickets</a>
        <!-- Dynamic link -->
        <a id="navActionMobile" href="login.html" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 font-medium">
          Login / Sign Up
        </a>
      </nav>
    </div>

    <!-- Desktop Menu -->
    <nav id="desktopMenu" class="hidden md:flex md:flex-row md:items-center md:space-x-6">
      <a href="index.html" class="text-orange-500 hover:text-blue-600 font-medium">Home</a>
      <a href="routes.html" class="text-orange-500 hover:text-blue-600 font-medium">Routes</a>
      <a href="courier.html" class="text-orange-500 hover:text-blue-600 font-medium">Courier Services</a>
      <a href="booking.html" class="text-orange-500 hover:text-blue-600 font-medium">Booking</a>
      <a href="viewtickets.html" class="text-orange-500 hover:text-blue-600 font-medium">View Tickets</a>
      <!-- Dynamic link -->
      <a id="navActionDesktop" href="login.html" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 font-medium">
        Login / Sign Up
      </a>
    </nav>
  </div>
</header>

  <!-- Booking Section -->
  <div class="container mx-auto px-5 pt-28 pb-20">
    <h2 class="text-2xl font-bold text-orange-500 mb-6">Book Your Seat</h2>
    
    <!-- Booking Form -->
    <form id="bookingForm" class="space-y-6">
      <div>
        <label class="block font-semibold">Full Name</label>
        <input type="text" id="name" required class="w-full border rounded px-4 py-2 text-black" />
      </div>
      <div>
        <label class="block font-semibold">Select Route & Departure Time</label>
        <select id="route" required class="w-full border rounded px-4 py-2 text-black">
          <option value="">-- Choose Route --</option>
          <option value="CBD → Westlands" data-price="200" data-time="6:00 AM">CBD → Westlands • 6:00 AM • KES 200</option>
          <option value="CBD → JKIA" data-price="300" data-time="7:00 PM">CBD → JKIA • 7:00 PM • KES 300</option>
          <option value="CBD → Thika" data-price="400" data-time="5:30 AM">CBD → Thika • 5:30 AM • KES 400</option>
          <option value="CBD → Rongai" data-price="250" data-time="8:00 PM">CBD → Rongai • 8:00 PM • KES 250</option>
          <option value="CBD → Karen" data-price="220" data-time="6:00 AM">CBD → Karen • 6:00 AM • KES 220</option>
          <option value="CBD → Kitengela" data-price="350" data-time="7:30 PM">CBD → Kitengela • 7:30 PM • KES 350</option>
          <option value="CBD → Ngong" data-price="280" data-time="6:00 AM">CBD → Ngong • 6:00 AM • KES 280</option>
          <option value="CBD → Mombasa Road" data-price="300" data-time="9:00 PM">CBD → Mombasa Road • 9:00 PM • KES 300</option>
        </select>
      </div>
      <div>
        <label class="block font-semibold">Day of Travel</label>
        <input type="date" id="day" required class="w-full border rounded px-4 py-2 text-black" />
      </div>
    </form>

    <!-- Seat Selection -->
    <h3 class="text-xl font-bold text-orange-500 mt-10 mb-4">Pick Your Seat</h3>
    <div id="seatGrid" class="grid grid-cols-4 gap-4"></div>

    <!-- Proceed Button at Bottom -->
    <button type="submit" form="bookingForm" class="bg-blue-500 text-white px-6 py-2 rounded hover:bg-blue-600 font-semibold mt-6">
      Proceed to Payment
    </button>
  </div>
  <!-- Inline nav bar script -->
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const navActionDesktop = document.getElementById("navActionDesktop");
    const navActionMobile = document.getElementById("navActionMobile");

    const currentUser = localStorage.getItem("currentUser");
    const accounts = JSON.parse(localStorage.getItem("accounts")) || {};

    if (currentUser && accounts[currentUser]) {
      // Logged in → show Account
      navActionDesktop.textContent = "Account";
      navActionDesktop.href = "account.html";
      navActionMobile.textContent = "Account";
      navActionMobile.href = "account.html";
    } else {
      // Not logged in → show Login / Sign Up
      navActionDesktop.textContent = "Login / Sign Up";
      navActionDesktop.href = "login.html";
      navActionMobile.textContent = "Login / Sign Up";
      navActionMobile.href = "login.html";
    }
  });
</script>
</body>
</html>
